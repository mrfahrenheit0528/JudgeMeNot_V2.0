{% extends "base.html" %}

{% block title %}Global Leaderboards{% endblock %}

{% block content %}
<div class="dashboard-container fade-in-up">
    <header class="page-header mb-4">
        <div>
            <h2><i class="fa-solid fa-trophy text-warning me-2"></i> Live Leaderboard</h2>
            <p class="text-muted m-0">System Standby Mode</p>
        </div>
    </header>

    <div class="glass-panel text-center fade-in-up" style="padding: 100px 20px; animation-delay: 0.2s;">
        <div style="position: relative; display: inline-block; margin-bottom: 25px;">
            <i class="fa-solid fa-satellite-dish text-primary fa-4x" style="opacity: 0.8;"></i>
            <!-- Radar ping animation circle -->
            <div style="position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; background: rgba(59, 130, 246, 0.2); border-radius: 50%; transform: translate(-50%, -50%); animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;"></div>
        </div>
        
        <h3 class="text-bright mb-3">No Events Are Currently Live</h3>
        <p class="text-muted mx-auto" style="max-width: 500px; line-height: 1.6;">
            The real-time leaderboard will automatically appear here the exact moment an administrator launches an event.
        </p>
        
        <button onclick="window.location.reload()" class="btn btn-outline-primary mt-4 glass-effect" style="border-radius: 30px; padding: 10px 25px;">
            <i class="fa-solid fa-rotate-right me-2"></i> Check Again
        </button>
    </div>
</div>

<style>
    @keyframes ping {
        75%, 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
</style>
{% endblock %}
